<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Cliente GPS Real Time</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha3/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-KK94CHFLLe+nY2dmCWGMq91rCGa5gtU4mk92HdvYe+M/SXH301p5ILy+dN9+nJOZ" crossorigin="anonymous">
  <!-- CSS de bootstrap-select -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/bootstrap-select/1.13.18/css/bootstrap-select.min.css">

  <!-- JavaScript de bootstrap-select -->
  
  <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/bootstrap-select/1.13.18/js/bootstrap-select.min.js"></script>

  <style>
    .container {
    max-width: auto;
    height: auto;
    border: 1px solid #ccc;
    overflow: hidden;
    }
    .container img {
    max-width: 100%;
    height: auto;
    display: block;
    }
		form {
		  border: 2px solid black;
		  background-color: blue;
		  padding: 20px; /* opcional, agrega espacio adicional entre el borde y el contenido del formulario */
      color: white; /* establece el color del texto en blanco */
		}
    .logo {
			display: block;
			margin: 0 auto;
			max-width: 100%;
			height: auto;
			padding-top: 20px;
			text-align: center;
      background-color: blue;
      border: 2px solid black;
		}
    .comment {
			font-size: 24px;
			font-style: italic;
			color: white;
			margin-top: 10px;
			text-align: center;
		}
    label.required {
      color: red;
    }

  </style>
</head>
<body>
    <div class="container col-8">
      <div class="logo">
        <img src="./img/banner.png" alt="Logo de mi formulario">
        <div class="comment">
          !!! Bienvenido a la Familia GPS Real Time ¡¡¡
        </div>
       
    </div>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha3/dist/js/bootstrap.bundle.min.js" integrity="sha384-ENjdO4Dr2bkBIFxQpeoTz1HIcje39Wm4jDKdf19U8gI4ddQ3GYNS7NTKfAdVQSZe" crossorigin="anonymous">    
  </script>
  <script src="https://maxcdn.bootstrapcdn.com/bootstrap/4.0.0/js/bootstrap.min.js"></script>
</body>
</html>
