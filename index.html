<!DOCTYPE html>
<html>
    
<head>
    <meta http-equiv="Content-Type" content="text/html; charset=UTF-8">

  <link href="./nice/assets/img/apple-touch-icon.png" rel="apple-touch-icon">

<body>	
<!------ Include the above in your HEAD tag ---------->

<div class="wrapper fadeInDown">
  <div id="formContent">
    <!-- Tabs Titles -->

    <!-- Icon -->
    <div class="fadeIn first">
        <img src="./img/logo.png" alt="Logo de mi formulario">
    </div>

    <!-- Login Form -->
    <form id="loginform">
      <input type="text" id="login_user" class="fadeIn second" name="login" placeholder="usuario">
      <input type="password" id="login_password" class="fadeIn third" name="login" placeholder="password">
      <input type="submit" class="fadeIn fourth" value="Log In">
    </form>

    <!-- Remind Passowrd -->
    <div id="formFooter">
      <a class="underlineHover" href="#">Forgot Password?</a>
    </div>
  </div>
</div>
